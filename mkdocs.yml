site_name: ClipKit
site_description: A lightweight, privacy-first clipboard manager for macOS
site_url: https://clipkit.readthedocs.io
repo_url: https://github.com/demigodmode/ClipKit
repo_name: demigodmode/ClipKit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Features: features.md
      - Keyboard Shortcuts: shortcuts.md
  - Development:
      - Building from Source: building.md
      - Architecture: architecture.md
      - Contributing: contributing.md
  - Roadmap: roadmap.md
